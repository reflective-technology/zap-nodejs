name: Release
on:
  push:
    branches:
      - main
    paths:
      - "package.json"
jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      value: ${{ steps.get_version.outputs.value }}
      tagged: ${{ steps.tagged.outputs.tagged }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Extract version from package.json
        uses: sergeysova/jq-action@a3f0d4ff59cc1dddf023fc0b325dd75b10deec58
        id: get_version
        with:
          cmd: "jq .version package.json -r"
      - name: Debug Version
        run: echo "VERSION=${{ steps.get_version.outputs.value }}"
      - name: "Check: package version has corresponding git tag"
        id: tagged
        shell: bash
        run: git show-ref --tags --verify --quiet -- "refs/tags/v${{ steps.get_version.outputs.value }}" && echo "tagged=0" >> $GITHUB_OUTPUT || echo "tagged=1" >> $GITHUB_OUTPUT
      - name: Debug Output
        run: echo "TAGGED=${{ steps.tagged.outputs.tagged }}"
  tag:
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.value != '0.0.0' && needs.version.outputs.tagged == '1'
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b #v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: "v"
          custom_tag: ${{ needs.version.outputs.value }}
      - uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd #v1.21.0
        with:
          generateReleaseNotes: true
          skipIfReleaseExists: true
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
  publish:
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.value != '0.0.0' && needs.version.outputs.tagged == '1'
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Use Node.js version 24.x
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.x
      - name: Install dependencies
        run: npm install
      - name: Build package
        run: npm run build
      - name: Update npm
        run: npm install -g npm@latest
      - name: Publish package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
