name: Code Coverage

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js version 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - run: npm i
      - run: npm run coverage
        env:
          CI: true
      - name: "Report Coverage"
        if: always()
        uses: davelosert/vitest-coverage-report-action@bd52af59d9cd548ea7cd405044d2458042e6d888 # v2.10.0
